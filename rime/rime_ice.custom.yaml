patch:
  traditionalize/opencc_config: s2tw.json
  engine/processors:
    - lua_processor@*select_character  # 以词定字
    # - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  switches:
    # - name: ascii_mode
    #   states: [ 中, Ａ ]
    # - name: ascii_punct  # 中英标点
    #   states: [ ¥, $ ]
    - name: traditionalization
      states: [ 简, 繁 ]
    # - name: emoji
    #   states: [ 💀, 😄 ]
    #   reset: 1
    # - name: full_shape
    #   states: [ 半角, 全角 ]
    - name: search_single_char  # search.lua 的功能开关，辅码查词时是否单字优先
      states: [正常, 单字]
      abbrev: [词, 单]
  traditionalize:
    option_name: traditionalization  # 对应 switches 中的 name
    opencc_config: s2tw.json          # s2t.json | s2hk.json | s2tw.json | s2twp.json （Rime 内置配置，在程序目录可找到）
    tips: none                       # 转换提示: all 都显示 | char 仅单字显示 | none 不显示。
    tags: [ abc, number, gregorian_to_lunar ]  # 限制在对应 tag，不对其他如反查的内容做简繁转换
