patch:
  app_options:
  style/color_scheme: purity_of_form_custom_dark
  style/color_scheme_dark: purity_of_form_custom_dark
  preset_color_schemes:
    # 对 purity_of_form 略微调整颜色，让色彩更柔和点，补全其他选项和注释
    purity_of_form_custom:
      candidate_list_layout: linear
      translucency: true
      border_height: 1
      border_width: 1
      corner_radius: 10
      text_color: 0x525252
      border_color: 0x7a7a7a
    purity_of_form_custom_dark:
      candidate_list_layout: linear
      translucency: true
      border_height: 1
      border_width: 1
      corner_radius: 10
      back_color: 0x292929
      text_color: 0xb5b5b5
      border_color: 0x525252
