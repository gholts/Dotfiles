patch:
  schema_list:
    - schema: rime_ice               # 雾凇拼音（全拼）
    #- schema: t9                     # 九宫格（仓输入法）
    #- schema: double_pinyin          # 自然码双拼
    #- schema: double_pinyin_abc      # 智能 ABC 双拼
    #- schema: double_pinyin_mspy     # 微软双拼
    #- schema: double_pinyin_sogou    # 搜狗双拼
    #- schema: double_pinyin_flypy    # 小鹤双拼
    #- schema: double_pinyin_ziguang  # 紫光双拼
    #- schema: double_pinyin_jiajia   # 拼音加加双拼
  menu/page_size: 7
  ascii_composer:
    good_old_caps_lock: true  # true | false
    switch_key:
      Caps_Lock: clear      # commit_code | commit_text | clear
      Shift_L: noop         # commit_code | commit_text | inline_ascii | clear | noop
      Shift_R: noop         # commit_code | commit_text | inline_ascii | clear | noop
      Control_L: noop       # commit_code | commit_text | inline_ascii | clear | noop
      Control_R: noop       # commit_code | commit_text | inline_ascii | clear | noop
  switcher:
    caption: 「Menu」
    hotkeys:
      - Control+grave
      # - F4
      # - Control+Shift+grave
      # - Alt+grave
    save_options:  # 开关记忆（方案中的 switches），从方案选单（而非快捷键）切换时会记住的选项，需要记忆的开关不能设定 reset
      # - ascii_punct
      - traditionalization
      # - emoji  # reset setted
      # - full_shape
      - search_single_char
    fold_options: false            # 呼出时是否折叠，多方案时建议折叠 true ，一个方案建议展开 false
    abbreviate_options: false      # 折叠时是否缩写选项
    option_list_separator: ' | '  # 折叠时的选项分隔符
  key_binder:
    # Lua 配置: 以词定字（上屏当前词句的第一个或最后一个字），和中括号翻页有冲突
    select_first_character: "bracketleft"  # 左中括号 [
    select_last_character: "bracketright"  # 右中括号 ]

    bindings:
      # Tab / Shift+Tab 切换光标至下/上一个拼音
      - { when: composing, accept: Shift+Tab, send: Shift+Left }
      - { when: composing, accept: Tab, send: Shift+Right }

      # 翻页 , .
      - { when: paging, accept: comma, send: Page_Up }
      - { when: has_menu, accept: period, send: Page_Down }
